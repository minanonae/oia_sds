<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Groups Maintenance | OIA Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="dashboard-body">

    <div class="dashboard-container">
        <div id="sidebar-placeholder"></div>

        <main class="main-content">
            
            <header class="content-header table-header">
                <div>
                    <h2>User Groups Maintenance List</h2>
                </div>
            </header>

            <div class="login-card search-card">
                <form class="search-form">
                    <div class="search-form-flex" style="justify-content: flex-start; gap: 30px; align-items: center; margin-bottom: 15px;">
                        <div class="input-group-horizontal">
                            <label>Group Name :</label>
                            <input type="text" class="w-200">
                        </div>
                        <div class="input-group-horizontal">
                            <label>Group Description :</label>
                            <input type="text" class="w-200">
                        </div>
                        <div class="input-group-horizontal ml-auto">
                            <label>Status :</label>
                            <select class="select-sm" style="min-width: 150px;">
                                <option value="Active" selected>Active</option>
                                <option value="Inactive">Inactive</option>
                            </select>
                        </div>
                    </div>

                    <div class="search-form-flex" style="justify-content: flex-end;">
                        <div class="search-buttons-right">
                            <button type="submit" class="btn-primary"><i class="fa-solid fa-magnifying-glass"></i> Search</button>
                            <button type="reset" class="btn-warning-fill" style="background-color: #ffc107; color: white; padding: 10px 20px; border-radius: 6px; border:none; cursor:pointer;"><i class="fa-solid fa-rotate-left"></i> Clear</button>
                        </div>
                    </div>
                </form>
            </div>

            <div class="action-bar new-layout" style="margin-bottom: 15px;">
                <button class="btn-primary" id="btnNewGroup"><i class="fa-solid fa-plus"></i> New</button>
            </div>

            <div class="login-card table-card borderless-table">
                <table class="data-table data-table-sds">
                    <thead>
                        <tr>
                            <th style="width: 140px;">Action</th>
                            <th>Name <i class="fa-solid fa-filter filter-icon"></i></th>
                            <th>Description <i class="fa-solid fa-filter filter-icon"></i></th>
                            <th>UpdateBy <i class="fa-solid fa-filter filter-icon"></i></th>
                            <th>Update Date <i class="fa-solid fa-filter filter-icon"></i></th>
                            <th>IsActive <i class="fa-solid fa-filter filter-icon"></i></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="action-cell">
                                <button class="btn-icon-transparent text-yellow" title="Edit Group"><i class="fa-solid fa-pencil"></i></button>
                                <button class="btn-icon-transparent text-red" title="Delete Group"><i class="fa-solid fa-trash-can"></i></button>
                                <button class="btn-icon-transparent text-blue" title="Manage Members"><i class="fa-solid fa-user-gear"></i></button>
                                <button class="btn-icon-transparent text-green" title="Edit Permissions"><i class="fa-solid fa-shield-halved"></i></button>
                            </td>
                            <td>Admin</td>
                            <td>Admin can create/edit/remove data</td>
                            <td>SYSTEM</td>
                            <td>17/03/2023 13:56</td>
                            <td><span class="status-badge status-complete" style="background-color: #28a745; color: white; padding: 4px 10px; border-radius: 4px; font-weight: bold;">Active</span></td>
                        </tr>
                        <tr>
                            <td class="action-cell">
                                <button class="btn-icon-transparent text-yellow" title="Edit Group"><i class="fa-solid fa-pencil"></i></button>
                                <button class="btn-icon-transparent text-red" title="Delete Group"><i class="fa-solid fa-trash-can"></i></button>
                                <button class="btn-icon-transparent text-blue" title="Manage Members"><i class="fa-solid fa-user-gear"></i></button>
                                <button class="btn-icon-transparent text-green" title="Edit Permissions"><i class="fa-solid fa-shield-halved"></i></button>
                            </td>
                            <td>User</td>
                            <td>User Operation</td>
                            <td>999999 9.</td>
                            <td>08/01/2026 13:14</td>
                            <td><span class="status-badge status-complete" style="background-color: #28a745; color: white; padding: 4px 10px; border-radius: 4px; font-weight: bold;">Active</span></td>
                        </tr>
                    </tbody>
                </table>
                
                <div class="pagination-container new-pagination-layout pagination-left">
                    <div class="pagination-nav flex-grow-0">
                        <button class="pagination-btn"><i class="fa-solid fa-angles-left"></i></button>
                        <button class="pagination-btn"><i class="fa-solid fa-angle-left"></i></button>
                        <button class="pagination-btn active-dark">1</button>
                        <button class="pagination-btn"><i class="fa-solid fa-angle-right"></i></button>
                        <button class="pagination-btn"><i class="fa-solid fa-angles-right"></i></button>
                    </div>
                    <div class="pagination-items-per-page">
                        <select id="itemsPerPage" class="select-sm" style="min-width: 60px;">
                            <option value="40" selected>40</option>
                        </select>
                        <label for="itemsPerPage" class="text-gray ml-2">items per page</label>
                    </div>
                    <div class="pagination-count text-gray ml-auto">1 - 2 of 2 items</div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
