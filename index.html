<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Okitsumo - SDS system</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="login-page-container">
        <div class="login-card">
            
            <div class="card-header">
                <img src="img/logo.png" alt="Okitsumo Logo" class="logo">
                <div class="header-text">
                    <h1>Welcome To</h1>
                    <p class="subtitle">Safety Data Sheet System</p>
                </div>
            </div>

            <form class="login-form" action="dashboard.html">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required placeholder="Enter your username">
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••••">
                </div>

                <div class="forgot-password">
                    <p>If you forget your password, please <a href="#">Contact Administrator</a></p>
                </div>

                <button type="submit" class="login-btn">Log In</button>
            </form>  

        </div>
    </div>

</body>
</html>
