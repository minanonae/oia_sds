<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OIA - SDS System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="dashboard-body">

    <div class="dashboard-container">
        <div id="sidebar-placeholder"></div>

        <main class="main-content">
    
    <header class="dashboard-header">
        <div class="header-titles">
            <span class="greeting">Hi, Admin</span>
            <h2 class="main-title">Dashboard Overview</h2>
        </div>
    </header>

    <div class="stats-grid modern-stats">
        <div class="stat-card modern-stat-card">
            <div class="stat-icon bg-light-blue text-blue">
                <i class="fa-solid fa-file-contract"></i>
            </div>
            <div class="stat-info">
                <span class="stat-label">Total SDS</span>
                <span class="stat-value">1,240</span>
                <span class="stat-change text-green">3 Updated today</span>
            </div>
        </div>

        <div class="stat-card modern-stat-card">
            <div class="stat-icon bg-light-orange text-orange">
                <i class="fa-solid fa-print"></i>
            </div>
            <div class="stat-info">
                <span class="stat-label">Labels Printed</span>
                <span class="stat-value">856</span>
                <span class="stat-change text-green">120 Updated today</span>
            </div>
        </div>

        <div class="stat-card modern-stat-card">
            <div class="stat-icon bg-light-green text-green">
                <i class="fa-solid fa-cubes"></i>
            </div>
            <div class="stat-info">
                <span class="stat-label">ERP Import</span>
                <span class="stat-value">342</span>
                <span class="stat-change text-green">5 New items</span>
            </div>
        </div>
    </div>

    <div class="dashboard-split">
        
        <div class="quick-actions-section">
            <h3 class="section-title">Quick Actions</h3>
            <div class="quick-actions-grid">
                
                <a href="output-sds.html" class="action-card">
                    <div class="action-icon bg-blue text-white">
                        <i class="fa-solid fa-file-export"></i>
                    </div>
                    <div class="action-text">
                        <h4>Output SDS</h4>
                        <p>Create new sheets</p>
                    </div>
                    <i class="fa-solid fa-chevron-right action-arrow"></i>
                </a>

                <a href="ghs-label.html" class="action-card">
                    <div class="action-icon bg-orange text-white">
                        <i class="fa-solid fa-print"></i>
                    </div>
                    <div class="action-text">
                        <h4>GHS Print</h4>
                        <p>Labeling System</p>
                    </div>
                    <i class="fa-solid fa-chevron-right action-arrow"></i>
                </a>

                <a href="erp-import.html" class="action-card">
                    <div class="action-icon bg-green text-white">
                        <i class="fa-solid fa-database"></i>
                    </div>
                    <div class="action-text">
                        <h4>ERP Import</h4>
                        <p>Sync Databases</p>
                    </div>
                    <i class="fa-solid fa-chevron-right action-arrow"></i>
                </a>
                
                </div>
        </div>

        <div class="recent-activity-section">
            <h3 class="section-title">Recent Activity</h3>
            <div class="activity-card login-card">
                <ul class="activity-timeline" id="recent-activity-list">
                    </ul>
            </div>
        </div>
        </div>
        
    </div>
</main>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
